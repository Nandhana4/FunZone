<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Color the Car</title>
  <style>
    body { font-family: "Comic Sans MS", cursive; background: #e3f2fd; text-align: center; padding: 20px; }
    h2 { color: #1976d2; }
    svg { width: 300px; margin-top: 20px; border: 2px dashed #64b5f6; background: white; border-radius: 10px; }
    input[type="color"], button { margin-top: 10px; padding: 8px 10px; border-radius: 8px; border: none; cursor: pointer; font-size: 16px; }
    button { background-color: #42a5f5; color: white; }
    button:hover { background-color: #1e88e5; }
    a { display: inline-block; margin-top: 20px; background: #42a5f5; color: white; padding: 10px 20px; border-radius: 10px; text-decoration: none; }
    a:hover { background: #1e88e5; }
  </style>
</head>
<body>
  <h2>🚗 Color the Car!</h2>
  <p>Click the parts to add your favorite colors!</p>
  <input type="color" id="colorPicker" value="#90caf9">
  <svg id="carDrawing" viewBox="0 0 200 100">
    <rect x="40" y="50" width="120" height="30" fill="#fff" stroke="#000" onclick="colorShape(this)" />
    <rect x="60" y="30" width="80" height="30" fill="#fff" stroke="#000" onclick="colorShape(this)" />
    <circle cx="60" cy="85" r="10" fill="#fff" stroke="#000" onclick="colorShape(this)" />
    <circle cx="140" cy="85" r="10" fill="#fff" stroke="#000" onclick="colorShape(this)" />
  </svg>
  <br>
  <button onclick="saveImage()">🖼️ Save My Coloring</button>
  <br>
  <a href="coloring-gallery.html">🔙 Back to Gallery</a>

  <script>
    function colorShape(el) {
      const color = document.getElementById("colorPicker").value;
      el.setAttribute("fill", color);
    }

    function saveImage() {
      const svg = document.getElementById("carDrawing");
      const svgData = new XMLSerializer().serializeToString(svg);
      const svgBlob = new Blob([svgData], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(svgBlob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "my-colored-car.svg";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>
</body>
</html>
