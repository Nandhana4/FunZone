<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Color the House</title>
  <style>
    body { font-family: "Comic Sans MS", cursive; background: #fffaf0; text-align: center; padding: 20px; }
    h2 { color: #ff7043; }
    svg { width: 300px; margin-top: 20px; border: 2px dashed #ffb74d; background: white; border-radius: 10px; }
   input[type="color"], button { margin-top: 10px; padding: 8px 10px; border-radius: 8px; border: none; cursor: pointer; font-size: 16px; }
       button { background-color: #ffa726; color: white; }
    button:hover { background-color: #fb8c00; ; }

    a { display: inline-block; margin-top: 20px; background: #ffa726; color: white; padding: 10px 20px; border-radius: 10px; text-decoration: none; }
    a:hover { background: #fb8c00; }
  </style>
</head>
<body>
  <h2>🏠 Color the House!</h2>
  <p>Pick a color and click parts of the house to fill!</p>
  <input type="color" id="colorPicker" value="#ff8a65">
  <svg viewBox="0 0 120 120">
    <polygon points="60,20 20,60 100,60" fill="#fff" stroke="#000" onclick="colorShape(this)" />
    <rect x="30" y="60" width="60" height="40" fill="#fff" stroke="#000" onclick="colorShape(this)" />
    <rect x="50" y="75" width="20" height="25" fill="#fff" stroke="#000" onclick="colorShape(this)" />
    <rect x="35" y="65" width="10" height="10" fill="#fff" stroke="#000" onclick="colorShape(this)" />
    <rect x="75" y="65" width="10" height="10" fill="#fff" stroke="#000" onclick="colorShape(this)" />
  </svg>
  <br>
<button onclick="saveImage()">🖼️ Save My Coloring</button><br>
  <a href="coloring-gallery.html">🔙 Back to Gallery</a>
  <script>
    function colorShape(el) {
      const color = document.getElementById("colorPicker").value;
      el.setAttribute("fill", color);
    }
 function saveImage() {
    const svg = document.querySelector("svg");
    const svgData = new XMLSerializer().serializeToString(svg);
    const svgBlob = new Blob([svgData], { type: "image/svg+xml;charset=utf-8" });
    const url = URL.createObjectURL(svgBlob);
    const link = document.createElement("a");
    link.href = url;
    link.download = "my-colored-house.svg";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }
 
  </script>
</body>
</html>
