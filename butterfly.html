<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Color the Butterfly</title>
  <style>
    body { font-family: "Comic Sans MS", cursive; background: #f0f8ff; text-align: center; padding: 20px; }
    h2 { color: #7b1fa2; }
    svg { width: 300px; margin-top: 20px; border: 2px dashed #ce93d8; background: white; border-radius: 10px; }
        input[type="color"], button { margin-top: 10px; padding: 8px 10px; border-radius: 8px; border: none; cursor: pointer; font-size: 16px; }
       button { background-color: #ab47bc;  color: white; }
    button:hover { background-color: #9c27b0; }


    a { display: inline-block; margin-top: 20px; background: #ab47bc; color: white; padding: 10px 20px; border-radius: 10px; text-decoration: none; }
    a:hover { background: #9c27b0; }
  </style>
</head>
<body>
  <h2>🦋 Color the Butterfly!</h2>
  <p>Click each wing section to color it!</p>
  <input type="color" id="colorPicker" value="#ba68c8">
  <svg viewBox="0 0 200 100">
    <ellipse cx="50" cy="50" rx="30" ry="40" fill="#fff" stroke="#000" onclick="colorShape(this)" />
    <ellipse cx="150" cy="50" rx="30" ry="40" fill="#fff" stroke="#000" onclick="colorShape(this)" />
    <circle cx="100" cy="50" r="10" fill="#fff" stroke="#000" onclick="colorShape(this)" />
  </svg>
  <br>
<button onclick="saveImage()">🖼️ Save My Coloring</button><br>
  <a href="coloring-gallery.html">🔙 Back to Gallery</a>
  <script>
    function colorShape(el) {
      const color = document.getElementById("colorPicker").value;
      el.setAttribute("fill", color);
    }
 function saveImage() {
    const svg = document.querySelector("svg");
    const svgData = new XMLSerializer().serializeToString(svg);
    const svgBlob = new Blob([svgData], { type: "image/svg+xml;charset=utf-8" });
    const url = URL.createObjectURL(svgBlob);
    const link = document.createElement("a");
    link.href = url;
    link.download = "my-colored-butterfly.svg";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }
 
  </script>
</body>
</html>
