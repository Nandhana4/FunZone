<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Color the Cat</title>
  <style>
    body { font-family: "Comic Sans MS", cursive; background: #fff0f5; text-align: center; padding: 20px; }
    h2 { color: #c2185b; }
    svg { width: 300px; margin-top: 20px; border: 2px dashed #f48fb1; background: white; border-radius: 10px; }
    input[type="color"], button { margin-top: 10px; padding: 8px 10px; border-radius: 8px; border: none; cursor: pointer; font-size: 16px; }
    button { background-color: #f06292; color: white; }
    button:hover { background-color: #ec407a; }
    a { display: inline-block; margin-top: 20px; background: #f06292; color: white; padding: 10px 20px; border-radius: 10px; text-decoration: none; }
    a:hover { background: #ec407a; }
  </style>
</head>
<body>
  <h2>🐱 Color the Cat!</h2>
  <p>Click parts of the cat to color them!</p>
  <input type="color" id="colorPicker" value="#f48fb1">
  <svg id="catDrawing" viewBox="0 0 200 200">
    <circle cx="100" cy="100" r="40" fill="#fff" stroke="#000" onclick="colorShape(this)" />
    <circle cx="80" cy="90" r="8" fill="#fff" stroke="#000" onclick="colorShape(this)" />
    <circle cx="120" cy="90" r="8" fill="#fff" stroke="#000" onclick="colorShape(this)" />
    <polygon points="70,70 80,50 90,70" fill="#fff" stroke="#000" onclick="colorShape(this)" />
    <polygon points="110,70 120,50 130,70" fill="#fff" stroke="#000" onclick="colorShape(this)" />
  </svg>
  <br>
  <button onclick="saveImage()">🖼️ Save My Coloring</button>
  <br>
  <a href="coloring-gallery.html">🔙 Back to Gallery</a>

  <script>
    function colorShape(el) {
      const color = document.getElementById("colorPicker").value;
      el.setAttribute("fill", color);
    }

    function saveImage() {
      const svg = document.getElementById("catDrawing");
      const svgData = new XMLSerializer().serializeToString(svg);
      const svgBlob = new Blob([svgData], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(svgBlob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "my-colored-cat.svg";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>
</body>
</html>
