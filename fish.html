<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Color the Fish</title>
  <style>
    body { font-family: "Comic Sans MS", cursive; background: #e0f7fa; text-align: center; padding: 20px; }
    h2 { color: #00838f; }
    svg { width: 300px; margin-top: 20px; border: 2px dashed #4dd0e1; background: white; border-radius: 10px; }
    input[type="color"], button { margin-top: 10px; padding: 8px 10px; border-radius: 8px; border: none; cursor: pointer; font-size: 16px; }
    button { background-color: #00acc1; color: white; }
    button:hover { background-color: #00838f; }
    a { display: inline-block; margin-top: 20px; background: #00acc1; color: white; padding: 10px 20px; border-radius: 10px; text-decoration: none; }
    a:hover { background: #00838f; }
  </style>
</head>
<body>
  <h2>🐠 Color the Fish!</h2>
  <p>Click parts of the fish to add color!</p>
  <input type="color" id="colorPicker" value="#4dd0e1">
  <svg id="fishDrawing" viewBox="0 0 200 100">
    <ellipse cx="100" cy="50" rx="40" ry="25" fill="#fff" stroke="#000" onclick="colorShape(this)" />
    <polygon points="140,50 170,30 170,70" fill="#fff" stroke="#000" onclick="colorShape(this)" />
    <circle cx="80" cy="50" r="4" fill="#000" />
  </svg>
  <br>
  <button onclick="saveImage()">🖼️ Save My Coloring</button>
  <br>
  <a href="coloring-gallery.html">🔙 Back to Gallery</a>

  <script>
    function colorShape(el) {
      const color = document.getElementById("colorPicker").value;
      el.setAttribute("fill", color);
    }

    function saveImage() {
      const svg = document.getElementById("fishDrawing");
      const svgData = new XMLSerializer().serializeToString(svg);
      const svgBlob = new Blob([svgData], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(svgBlob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "my-colored-fish.svg";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>
</body>
</html>
