nav a {

  text-decoration: none;
  padding: 10px 18px;
  border-radius: 12px;
  background-color: #ff1493;
  box-shadow: 2px 2px 5px #ddd;
  transition: background 0.3s, transform 0.2s;
}

nav a:hover {
  background-color: #f8bbd0;
  transform: scale(1.1);
}

    .item {
      border: 2px dashed #ffb6c1;

      width: 100%;
      height: auto;
      border-radius: 10px;
    }
    .item a {
      display: block;
      margin-top: 10px;
      background-color: #ff69b4;
      color: white;
      padding: 10px;
      border-radius: 10px;
