<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Color the Rainbow</title>
  <style>
    body { font-family: "Comic Sans MS", cursive; background: #e0f7fa; text-align: center; padding: 20px; }
    h2 { color: #039be5; }
    svg { width: 300px; margin-top: 20px; border: 2px dashed #4dd0e1; background: white; border-radius: 10px; }
    
    input[type="color"], button { margin-top: 10px; padding: 8px 10px; border-radius: 8px; border: none; cursor: pointer; font-size: 16px; }
       button { background-color: #00acc1; color: white; }
    button:hover { background-color: #00838f; }


    a { display: inline-block; margin-top: 20px; background: #00acc1; color: white; padding: 10px 20px; border-radius: 10px; text-decoration: none; }
    a:hover { background: #00838f; }
  </style>
</head>
<body>
  <h2>🌈 Color the Rainbow!</h2>
  <p>Pick a color and click each arc to color it!</p>
  <input type="color" id="colorPicker" value="#4fc3f7">
  <svg viewBox="0 0 200 100">
    <path d="M20,100 A80,80 0 0,1 180,100" stroke="#000" stroke-width="16" fill="none" onclick="colorShape(this)" />
    <path d="M30,100 A70,70 0 0,1 170,100" stroke="#000" stroke-width="14" fill="none" onclick="colorShape(this)" />
    <path d="M40,100 A60,60 0 0,1 160,100" stroke="#000" stroke-width="12" fill="none" onclick="colorShape(this)" />
    <path d="M50,100 A50,50 0 0,1 150,100" stroke="#000" stroke-width="10" fill="none" onclick="colorShape(this)" />
    <path d="M60,100 A40,40 0 0,1 140,100" stroke="#000" stroke-width="8" fill="none" onclick="colorShape(this)" />
  </svg>
  <br>
<button onclick="saveImage()">🖼️ Save My Coloring</button>
<br>
  <a href="coloring-gallery.html">🔙 Back to Gallery</a>
  <script>
    function colorShape(path) {
      const color = document.getElementById("colorPicker").value;
      path.setAttribute("stroke", color);
    }
 function saveImage() {
    const svg = document.querySelector("svg");
    const svgData = new XMLSerializer().serializeToString(svg);
    const svgBlob = new Blob([svgData], { type: "image/svg+xml;charset=utf-8" });
    const url = URL.createObjectURL(svgBlob);
    const link = document.createElement("a");
    link.href = url;
    link.download = "my-colored-rainbow.svg";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }
 
  </script>
</body>
</html>
