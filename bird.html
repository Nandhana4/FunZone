<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Color the Bird</title>
  <style>
    body { font-family: "Comic Sans MS", cursive; background: #f3e5f5; text-align: center; padding: 20px; }
    h2 { color: #7b1fa2; }
    svg { width: 300px; margin-top: 20px; border: 2px dashed #ba68c8; background: white; border-radius: 10px; }
    input[type="color"], button { margin-top: 10px; padding: 8px 10px; border-radius: 8px; border: none; cursor: pointer; font-size: 16px; }
    button { background-color: #ab47bc; color: white; }
    button:hover { background-color: #8e24aa; }
    a { display: inline-block; margin-top: 20px; background: #ab47bc; color: white; padding: 10px 20px; border-radius: 10px; text-decoration: none; }
    a:hover { background: #8e24aa; }
  </style>
</head>
<body>
  <h2>🐦 Color the Bird!</h2>
  <p>Click on the bird parts to color them!</p>
  <input type="color" id="colorPicker" value="#ba68c8">
  <svg id="birdDrawing" viewBox="0 0 200 120">
    <ellipse cx="100" cy="60" rx="50" ry="25" fill="#fff" stroke="#000" onclick="colorShape(this)" />
    <circle cx="80" cy="50" r="5" fill="#fff" stroke="#000" onclick="colorShape(this)" />
    <polygon points="150,60 180,40 180,80" fill="#fff" stroke="#000" onclick="colorShape(this)" />
  </svg>
  <br>
  <button onclick="saveImage()">🖼️ Save My Coloring</button>
  <br>
  <a href="coloring-gallery.html">🔙 Back to Gallery</a>

  <script>
    function colorShape(el) {
      const color = document.getElementById("colorPicker").value;
      el.setAttribute("fill", color);
    }

    function saveImage() {
      const svg = document.getElementById("birdDrawing");
      const svgData = new XMLSerializer().serializeToString(svg);
      const svgBlob = new Blob([svgData], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(svgBlob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "my-colored-bird.svg";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>
</body>
</html>
