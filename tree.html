<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Color the Tree</title>
  <style>
    body { font-family: "Comic Sans MS", cursive; background: #f1f8e9; text-align: center; padding: 20px; }
    h2 { color: #558b2f; }
    svg { width: 300px; margin-top: 20px; border: 2px dashed #aed581; background: white; border-radius: 10px; }
    
input[type="color"], button { margin-top: 10px; padding: 8px 10px; border-radius: 8px; border: none; cursor: pointer; font-size: 16px; }
       button { background-color: #8bc34a; color: white; }
    button:hover { background-color: #689f38; }


    a { display: inline-block; margin-top: 20px; background: #8bc34a; color: white; padding: 10px 20px; border-radius: 10px; text-decoration: none; }
    a:hover { background: #689f38; }
  </style>
</head>
<body>
  <h2>🌳 Color the Tree!</h2>
  <p>Click the leaves or trunk to fill with your favorite color!</p>
  <input type="color" id="colorPicker" value="#81c784">
  <svg viewBox="0 0 200 200">
    <rect x="90" y="120" width="20" height="60" fill="#fff" stroke="#000" onclick="colorShape(this)" />
    <circle cx="100" cy="100" r="30" fill="#fff" stroke="#000" onclick="colorShape(this)" />
    <circle cx="70" cy="90" r="25" fill="#fff" stroke="#000" onclick="colorShape(this)" />
    <circle cx="130" cy="90" r="25" fill="#fff" stroke="#000" onclick="colorShape(this)" />
  </svg>
  <br>
  <button onclick="saveImage()">🖼️ Save My Coloring</button>
  <br>
  <a href="coloring-gallery.html">🔙 Back to Gallery</a>
  <script>
    function colorShape(el) {
      const color = document.getElementById("colorPicker").value;
      el.setAttribute("fill", color);
    }

  function saveImage() {
    const svg = document.querySelector("svg");
    const svgData = new XMLSerializer().serializeToString(svg);
    const svgBlob = new Blob([svgData], { type: "image/svg+xml;charset=utf-8" });
    const url = URL.createObjectURL(svgBlob);
    const link = document.createElement("a");
    link.href = url;
    link.download = "my-colored-tree.svg";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }


  </script>
</body>
</html>
